<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Kato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Cafe Kato</h1>
        <nav>

        <p>© 2026 Cafe Kato</p>
    </footer>
